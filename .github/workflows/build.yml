name: Build Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Rebuild native modules for system Node
        run: pnpm rebuild better-sqlite3

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Security audit
        run: pnpm audit --audit-level moderate
        continue-on-error: true

      - name: Test with coverage
        run: pnpm test -- --coverage

  build-mac:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pnpm install

      - name: Prepare embedded Python
        run: pnpm run prepare:python:embedded

      - name: Build renderer
        run: pnpm run build:renderer

      - name: Build macOS DMG
        run: CSC_IDENTITY_AUTO_DISCOVERY=false pnpm electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SHA256 checksums
        run: |
          cd dist
          shasum -a 256 *.dmg *.zip 2>/dev/null > checksums-sha256.txt || true
          cat checksums-sha256.txt

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Murmur-macOS
          path: |
            dist/*.dmg
            dist/*.zip
            dist/checksums-sha256.txt

  build-win:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Rebuild native modules
        run: pnpm rebuild better-sqlite3

      - name: Prepare embedded Python
        run: pnpm run prepare:python:embedded

      - name: Build renderer
        run: pnpm run build:renderer

      - name: Build Windows EXE
        run: CSC_IDENTITY_AUTO_DISCOVERY=false pnpm electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          Set-Location dist
          $files = Get-ChildItem -Filter "*.exe" ; Get-ChildItem -Filter "*.zip"
          $hashes = foreach ($f in (Get-ChildItem -Include "*.exe","*.zip" -File)) {
            $hash = (Get-FileHash -Path $f.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($f.Name)"
          }
          $hashes | Out-File -Encoding utf8 checksums-sha256.txt
          Get-Content checksums-sha256.txt

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Murmur-Windows
          path: |
            dist/*.exe
            dist/*.zip
            dist/checksums-sha256.txt

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Merge SHA256 checksums
        run: |
          cat Murmur-macOS/checksums-sha256.txt Murmur-Windows/checksums-sha256.txt > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            Murmur-macOS/*
            Murmur-Windows/*
            checksums-sha256.txt
          generate_release_notes: false
          body: |
            ## What's Changed

            See [CHANGELOG.md](https://github.com/TeFuirnever/Murmur/blob/main/CHANGELOG.md) for details.

            ## Installation

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `Murmur-*.dmg` |
            | Windows | `Murmur-Setup-*.exe` |

            **Verify download integrity**: compare your file's SHA256 with `checksums-sha256.txt`.

            **Prerequisites**: None for basic usage. Audio format conversion (mp3/ogg) is handled by the built-in Python environment.

            **First launch**: Murmur downloads the FunASR model (~1GB) on first run.

            **macOS**: If you see "cannot verify developer", right-click the app → "Open".
