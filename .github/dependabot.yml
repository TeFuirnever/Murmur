version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    reviewers:
      - woshiguanxiaoliang
    labels:
      - dependencies
    # Do NOT auto-merge — all Dependabot PRs require manual review + CI pass

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    reviewers:
      - woshiguanxiaoliang
    labels:
      - ci
      - dependencies
